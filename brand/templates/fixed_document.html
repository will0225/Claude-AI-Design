<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
{{STYLES}}
  </style>
</head>
<body>
  <header class="doc-header">
    <p class="doc-type">{{DOC_TYPE}}</p>
    <h1 class="company-name">{{COMPANY_NAME}}</h1>
    <p class="tagline">{{TAGLINE}}</p>
    <p class="doc-meta">{{DOCUMENT_TITLE}} &nbsp;|&nbsp; {{DATE}}</p>
  </header>

  <main class="doc-body">
{{SECTIONS}}
  </main>

  <footer class="doc-footer">
    <p>{{COMPANY_NAME}} &nbsp;|&nbsp; {{CONTACT_EMAIL}} &nbsp;|&nbsp; {{WEBSITE}}</p>
  </footer>
</body>
</html>
