# =============================================================================
# HVAC ASSET MANAGEMENT — Brand & document templates
# =============================================================================
# Copy to brand.config.yaml once:
#   cp brand.config.example.yaml brand.config.yaml
# =============================================================================

company:
  name: "HVAC Asset Management"
  tagline: "Forensic Asset & Spend Review"
  website: ""
  contact_email: "Audit@hvacasset.com"
  contact_phone: "(877) 239-7716"
  license: "CA Lic. #496061"

document_labels:
  report_type: "Forensic Asset & Spend Review"
  confidential: "CONFIDENTIAL · CLIENT EYES ONLY"
  footer_disclaimer: >-
    Prepared by HVAC Asset Management as an independent forensic baseline.
    Figures reconcile to the client general ledger; recommendations do not
    constitute engineering certification.

colors:
  primary: "#0f2744"
  secondary: "#1a4480"
  accent: "#c05621"
  critical: "#c53030"
  high: "#dd6b20"
  medium: "#d69e2e"
  text: "#1a202c"
  text_light: "#4a5568"
  background: "#ffffff"
  surface: "#f7fafc"
  border: "#e2e8f0"

fonts:
  heading: "Libre Franklin"
  body: "Source Sans 3"
  heading_url: "https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@600;700&display=swap"
  body_url: "https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600&display=swap"

writing_style:
  tone: "forensic, precise, authoritative — suitable for property owners and asset managers"
  voice: "Third person for findings; direct ACTION lines for recommendations"
  avoid:
    - "marketing language"
    - "exclamation marks"
    - "unsupported speculation"
  paragraph_style: "2–4 sentences; lead with the finding or number"
  audience: "property owners, asset managers, and portfolio controllers"

# Forensic spend review — fixed section order (matches Standard Review format)
report:
  sections:
    - number: "00"
      name: "Executive Summary"
      description: "Opening narrative plus KPI stat grid (operating spend, capital, rebate, reactive:preventive ratio, comfort complaints, finding counts)"
    - number: "01"
      name: "Financial & Contractual Baseline"
      description: "GL cost-category table, R&M detail table, active service agreement summary"
    - number: "02"
      name: "Vendor Performance & Standard-of-Care Audit"
      description: "Vendor engagement table, quarterly PM execution vs contracted scope with documentation gaps"
    - number: "03"
      name: "Asset & Equipment Risk + Capital Plan"
      description: "Capital replacements placed in service, pending replacements, end-of-life fleet notes"
    - number: "04"
      name: "Comfort & Reliability — Hot / Cold Calls"
      description: "Per-suite complaint timeline — CHRONIC vs RESOLVED, visit dates, spend, warranty notes"
    - number: "05"
      name: "Findings, Exposure & Recommendations"
      description: "Findings F-01+ by severity (CRITICAL/HIGH/MEDIUM) with ACTION lines, prioritized recommendations table, data gaps list"

proposal:
  sections:
    - number: "00"
      name: "Executive Summary"
      description: "Scope, property, review period, and deliverables overview"
    - number: "01"
      name: "Scope of Services"
      description: "Forensic review activities — GL reconciliation, vendor audit, asset risk, comfort log"
    - number: "02"
      name: "Deliverables & Timeline"
      description: "Report format, issuance date, data required from client"
    - number: "03"
      name: "Investment"
      description: "Fee structure and payment terms"
    - number: "04"
      name: "Next Steps"
      description: "Engagement acceptance and data-request checklist"

behavior:
  never_ask_about:
    - "brand colors"
    - "fonts or typography"
    - "company name or contact details"
    - "document section structure"
    - "writing tone or voice"
    - "report section numbering"
  if_detail_missing: 'Use <span class="fill-in">[FILL IN: brief description]</span> — do not ask the user'

report_html_patterns: |
  Use these CSS classes in section HTML fragments:
  - .kpi-grid > .kpi-card with .kpi-value and .kpi-label for Executive Summary stats
  - table.data-table for all financial/vendor tables (thead + tbody)
  - .finding.finding-critical, .finding-high, .finding-medium for findings blocks
  - .finding-id (e.g. F-01), .finding-title, .finding-action for finding structure
  - .flag-critical, .flag-high for inline PM/audit flags
  - .timeline for comfort-call date sequences
  - .data-gaps for bulleted missing-data list at end of section 05
